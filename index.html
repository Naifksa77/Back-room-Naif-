<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lord Naif - The Director's Cut V8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; color: white; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 20px; text-align: center; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .no-cam { pointer-events: auto; } /* كلاس يمنع تحريك الكاميرا عند لمس الـ UI */
        
        #timer { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; border: 1px solid #555; }
        
        #inventory { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; flex-wrap: wrap; width: 150px; justify-content: flex-end; }
        .inv-item { background: rgba(0,0,0,0.7); border: 1px solid #555; border-radius: 8px; padding: 4px 8px; font-size: 14px; display: none; flex-direction: column; align-items: center; }
        .inv-item.blue { cursor: pointer; border-color: cyan; }
        .inv-count { font-weight: bold; margin-top: 2px; }
        .blue-timer { font-size: 10px; color: cyan; }

        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; position: absolute; top: 40px; left: 40px; }

        .action-btn { position: absolute; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #btn-run { bottom: 30px; right: 30px; width: 75px; height: 75px; background: rgba(255,255,255,0.15); }
        #btn-shoot { bottom: 120px; right: 30px; width: 60px; height: 60px; background: rgba(255,215,0,0.2); border-color: gold; display: none; }
        
        #stamina-container { position: absolute; bottom: 30px; right: 120px; width: 120px; height: 15px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 4px; transition: width 0.3s; }
        #stamina-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }
        #stamina-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center; font-size: 10px; line-height: 15px; font-weight: bold; text-shadow: 1px 1px #000; }

        #minimap { position: absolute; top: 15px; left: 15px; width: 110px; height: 110px; border: 2px solid rgba(255,215,0,0.5); border-radius: 50%; background: rgba(0,0,0,0.8); overflow: hidden; }
        
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; color: yellow; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; display: none; }
        
        #death-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; }
        .restart-btn { margin-top: 30px; padding: 15px 40px; background: #aa0000; color: #fff; border: 2px solid #fff; cursor: pointer; font-size: 20px; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="rotate">استدر بالجوال للوضع العرضي 📱</div>
    
    <div id="ui">
        <div id="timer">05:00</div>
        <div id="minimap" class="no-cam"><canvas id="minimap-canvas" width="110" height="110"></canvas></div>

        <div id="inventory" class="no-cam">
            <div id="inv-pink" class="inv-item" style="color: hotpink;">💎 <span class="inv-count">0</span></div>
            <div id="inv-blue" class="inv-item blue">🔵 <span class="inv-count">0</span><div id="blue-timer-txt" class="blue-timer"></div></div>
            <div id="inv-green" class="inv-item" style="color: lime;">🟢 <span class="inv-count">0</span></div>
            <div id="inv-weapon" class="inv-item" style="color: gold;">🔫 <span class="inv-count">0</span></div>
            <div id="inv-ammo" class="inv-item" style="color: gray;">🪨 <span class="inv-count">0</span></div>
        </div>

        <div id="stamina-container" class="no-cam">
            <div id="stamina-fill"></div>
            <div id="stamina-text">100 / 100</div>
        </div>
        
        <div id="btn-shoot" class="action-btn no-cam">🔊</div>
        <div id="btn-run" class="action-btn no-cam">اركض</div>
        <div id="joystick-zone" class="no-cam"><div id="joystick-stick"></div></div>
        
        <div id="msg"></div>
    </div>

    <div id="death-screen">
        <h1 style="color: #ff3333; font-size: 45px; text-shadow: 3px 3px #000; margin-bottom: 0;">نال الوحش منك</h1>
        <button class="restart-btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>

    <script>
        let scene, camera, renderer, clock, playerLight;
        let mapSize = 35, cellSize = 5; 
        let grid = [], walls = [], items = [], monsters = [], portal = null;
        let gameTime = 300; 

        let player = {
            origSpeed: 4, baseSpeed: 4, currentSpeed: 4,
            maxStamina: 100, stamina: 100,
            isRunning: false, isMoving: false, isDead: false,
            crystals: { pink: 0, blue: 0, green: 0 },
            hasWeapon: false, ammo: 0,
            blueActive: false, blueTimeLeft: 0,
            deathTimer: 0, greenCount: 0
        };

        // متغيرات التحكم (لمس ذكي)
        let joyId = null, camId = null;
        let joyVector = { x: 0, y: 0 };
        let lastCamX = 0, lastCamY = 0;
        
        let audioCtx = null;
        let lastStepTime = 0;

        function initAudio() {
            if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        }

        function playSound(type, isRunning = false) {
            if(!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'monster') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(isRunning ? 90 : 130, audioCtx.currentTime);
                gain.gain.setValueAtTime(isRunning ? 0.9 : 0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            } else if(type === 'player') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(isRunning ? 200 : 150, audioCtx.currentTime);
                gain.gain.setValueAtTime(isRunning ? 0.15 : 0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            } else if(type === 'weapon') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            }
            osc.start(); osc.stop(audioCtx.currentTime + (type==='weapon'?0.5:0.15));
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.07);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(cellSize * 2, 1.6, cellSize * 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0x1a1a20));
            playerLight = new THREE.PointLight(0xffeedd, 1.2, 15);
            camera.add(playerLight); scene.add(camera);

            let floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);

            generateScatteredMaze();
            
            // البداية
            spawnItem('blue', new THREE.Vector3(cellSize*3, 0.5, cellSize*2)); // قريبة جداً
            spawnItem('blue', getEmptyPos()); spawnItem('blue', getEmptyPos());
            spawnItem('pink', getEmptyPos()); spawnItem('pink', getEmptyPos());
            spawnItem('green', getEmptyPos()); // الأولى
            spawnItem('weapon', getEmptyPos());
            spawnItem('ammo', getEmptyPos()); spawnItem('ammo', getEmptyPos()); spawnItem('ammo', getEmptyPos());

            // الوحش الأول بعيد جداً
            spawnMonster('white', new THREE.Vector3(cellSize*(mapSize-3), 0, cellSize*(mapSize-3)));

            setupTouchControls();
            startTimer();
            window.addEventListener('touchstart', initAudio, {once:true});
            animate();
        }

        // متاهة متقطعة للمناورة
        function generateScatteredMaze() {
            const wallGeo = new THREE.BoxGeometry(cellSize, 5, cellSize);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            for(let i=0; i<mapSize; i++) {
                grid[i] = [];
                for(let j=0; j<mapSize; j++) {
                    // احتمالية أقل للجدران المستمرة، وتكسير الزوايا
                    let isWall = (i===0 || i===mapSize-1 || j===0 || j===mapSize-1);
                    if(!isWall && i>3 && j>3) {
                        if(Math.random() > 0.8) isWall = true;
                        // منع تكتل الجدران
                        if(i>0 && grid[i-1][j] === 1 && Math.random() > 0.4) isWall = false; 
                    }
                    
                    if(isWall) {
                        grid[i][j] = 1;
                        let wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(i*cellSize, 2.5, j*cellSize);
                        scene.add(wall); walls.push(wall);
                    } else { grid[i][j] = 0; }
                }
            }
        }

        function createMonsterModel(isRed) {
            let group = new THREE.Group();
            let mat = new THREE.MeshStandardMaterial({ color: isRed ? 0xaa0000 : 0xbbbbbb, roughness: 0.4 });
            let torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.2, 0.3), mat); torso.position.y = 2.6; group.add(torso);
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.25), mat); head.position.y = 4.0; group.add(head);
            let armL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 3), mat); armL.position.set(-0.4, 1.5, 0); group.add(armL);
            let armR = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 3), mat); armR.position.set(0.4, 1.5, 0); group.add(armR);
            let legL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.8), mat); legL.position.set(-0.15, 0.6, 0); group.add(legL);
            let legR = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.8), mat); legR.position.set(0.15, 0.6, 0); group.add(legR);
            if(isRed) { let glow = new THREE.PointLight(0xff0000, 2, 10); glow.position.y = 2.5; group.add(glow); }
            return group;
        }

        function createPortal() {
            portal = new THREE.Group();
            let frame = new THREE.Mesh(new THREE.BoxGeometry(4.5, 6, 0.5), new THREE.MeshStandardMaterial({color: 0x050505}));
            let inner = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 5), new THREE.MeshBasicMaterial({color: 0xcc0000}));
            inner.position.z = 0.26; inner.position.y = -0.2;
            let glow = new THREE.PointLight(0xff0000, 2, 8); inner.add(glow);
            portal.add(frame); portal.add(inner);
            portal.position.set(cellSize*3, 3, cellSize*(mapSize-4)); // الجنوب الغربي
            portal.lookAt(camera.position.x, 3, camera.position.z);
            scene.add(portal);
        }

        function getEmptyPos() {
            let x, z;
            do { x = Math.floor(Math.random()*(mapSize-4))+2; z = Math.floor(Math.random()*(mapSize-4))+2; } while(grid[x][z] === 1);
            return new THREE.Vector3(x*cellSize, 0, z*cellSize);
        }

        function spawnMonster(type, pos = null) {
            let mesh = createMonsterModel(type === 'red');
            mesh.position.copy(pos || getEmptyPos());
            scene.add(mesh);
            monsters.push({ mesh: mesh, type: type, aggro: false, stepTimer: 0, fleeTimer: 0 });
        }

        function spawnItem(type, pos) {
            let color = type==='blue'?0x00ffff : type==='pink'?0xff69b4 : type==='green'?0x00ff00 : type==='weapon'?0xffd700 : 0x888888;
            let mesh = new THREE.Mesh(new THREE.OctahedronGeometry(type==='weapon'?0.5:0.3), new THREE.MeshBasicMaterial({color: color}));
            mesh.position.copy(pos); mesh.position.y = 0.5; scene.add(mesh);
            items.push({ mesh: mesh, type: type });
        }

        function setupTouchControls() {
            const joyZone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            let jRect = joyZone.getBoundingClientRect(), jCX = jRect.left + jRect.width/2, jCY = jRect.top + jRect.height/2;

            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.target.closest('#joystick-zone')) {
                        joyId = t.identifier; updateJoy(t);
                    } else if(t.target.closest('.no-cam')) {
                        // لا تفعل شيئاً، هذا زر أو واجهة
                    } else if(camId === null) {
                        camId = t.identifier; lastCamX = t.clientX; lastCamY = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === joyId) {
                        e.preventDefault(); updateJoy(t);
                    } else if(t.identifier === camId) {
                        e.preventDefault();
                        camera.rotation.y -= (t.clientX - lastCamX) * 0.005;
                        // إضافة الالتفاف لأعلى ولأسفل بحدود
                        camera.rotation.x -= (t.clientY - lastCamY) * 0.005;
                        camera.rotation.x = Math.max(-Math.PI/4, Math.min(Math.PI/4, camera.rotation.x));
                        lastCamX = t.clientX; lastCamY = t.clientY;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === joyId) { joyId = null; joyVector = {x:0, y:0}; stick.style.transform = `translate(0px, 0px)`; player.isMoving = false; }
                    else if(t.identifier === camId) { camId = null; }
                }
            });

            function updateJoy(t) {
                player.isMoving = true;
                let dx = t.clientX - jCX, dy = t.clientY - jCY;
                let dist = Math.sqrt(dx*dx + dy*dy), maxDist = 40;
                if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                joyVector = { x: dx/maxDist, y: dy/maxDist };
            }

            // الأزرار
            const runBtn = document.getElementById('btn-run');
            runBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.isRunning = true; runBtn.style.background = 'rgba(255,255,255,0.4)'; });
            runBtn.addEventListener('touchend', (e) => { e.preventDefault(); player.isRunning = false; runBtn.style.background = 'rgba(255,255,255,0.1)'; });

            document.getElementById('inv-blue').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(player.crystals.blue > 0 && !player.blueActive) {
                    player.crystals.blue--; updateInv();
                    player.blueActive = true; player.blueTimeLeft = 120;
                    playerLight.intensity = 4; playerLight.distance = 50;
                }
            });

            // السلاح الصوتي
            document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(player.hasWeapon && player.ammo > 0) {
                    player.ammo--; updateInv(); playSound('weapon');
                    monsters.forEach(m => {
                        if(m.type !== 'red' && camera.position.distanceTo(m.mesh.position) <= 6) {
                            m.fleeTimer = 5; m.aggro = false; // يهرب 5 ثواني
                        }
                    });
                }
            });
        }

        function updateInv() {
            ['pink', 'blue', 'green', 'ammo'].forEach(k => {
                let ui = document.getElementById('inv-'+k);
                let val = k==='ammo'? player.ammo : player.crystals[k];
                if(val > 0 || (k==='blue' && player.blueActive)) { ui.style.display = 'flex'; ui.querySelector('.inv-count').innerText = val; }
                else { ui.style.display = 'none'; }
            });
            if(player.hasWeapon) {
                document.getElementById('inv-weapon').style.display = 'flex';
                document.getElementById('inv-weapon').querySelector('.inv-count').innerText = "1";
                document.getElementById('btn-shoot').style.display = 'flex';
            }
        }

        function startTimer() {
            setInterval(() => {
                if(gameTime > 0 && !player.isDead) {
                    gameTime--;
                    let m = Math.floor(gameTime/60), s = gameTime%60;
                    document.getElementById('timer').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                    
                    // الدقيقة 2:00 (بوابة ووحش ثاني وكريستالة ثانية)
                    if(gameTime === 120) {
                        createPortal();
                        spawnMonster('white', new THREE.Vector3(cellSize*3, 0, cellSize*(mapSize-4)));
                        spawnItem('green', getEmptyPos());
                        showMsg("ظهر الوحش الثاني من البوابة!");
                    }

                    if(player.blueActive) {
                        player.blueTimeLeft--;
                        let bm = Math.floor(player.blueTimeLeft/60), bs = player.blueTimeLeft%60;
                        document.getElementById('blue-timer-txt').innerText = `${bm}:${bs<10?'0':''}${bs}`;
                        if(player.blueTimeLeft <= 0) {
                            player.blueActive = false; playerLight.intensity = 1.2; playerLight.distance = 15;
                            document.getElementById('blue-timer-txt').innerText = ""; updateInv();
                        }
                    }
                }
            }, 1000);
        }

        function showMsg(t) {
            let el = document.getElementById('msg'); el.innerText = t; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function canMoveTo(newX, newZ) {
            let gX = Math.round(newX / cellSize), gZ = Math.round(newZ / cellSize);
            if(gX < 0 || gX >= mapSize || gZ < 0 || gZ >= mapSize) return false;
            return grid[gX][gZ] === 0;
        }

        function teleportPlayer() {
            let pos = getEmptyPos();
            camera.position.set(pos.x, 1.6, pos.z);
            showMsg("استخدمت الكريستالة الوردية للهروب!");
        }

        let deadBody = null;

        function animate() {
            requestAnimationFrame(animate);
            let delta = Math.min(clock.getDelta(), 0.1);

            // كاميرا الموت 360
            if(player.isDead) {
                player.deathTimer += delta;
                if(!deadBody) {
                    deadBody = new THREE.Group();
                    let mat = new THREE.MeshStandardMaterial({color: 0xddccaa}); // بيج
                    let torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 0.3), mat); torso.rotation.x = Math.PI/2; deadBody.add(torso);
                    let head = new THREE.Mesh(new THREE.SphereGeometry(0.2), mat); head.position.z = 0.9; deadBody.add(head);
                    deadBody.position.copy(camera.position); deadBody.position.y = 0.2; scene.add(deadBody);
                    document.getElementById('ui').style.display = 'none';
                }
                camera.position.x = deadBody.position.x + Math.sin(player.deathTimer * 1.5) * 4;
                camera.position.z = deadBody.position.z + Math.cos(player.deathTimer * 1.5) * 4;
                camera.position.y = 2.5; camera.lookAt(deadBody.position);
                
                if(player.deathTimer > 3) document.getElementById('death-screen').style.display = 'flex';
                renderer.render(scene, camera); return;
            }

            // حركة اللاعب
            if(player.isMoving && player.isRunning && player.stamina > 0) player.stamina -= 25 * delta;
            else player.stamina = Math.min(player.maxStamina, player.stamina + 15 * delta);
            
            let staminaPct = (player.stamina / player.maxStamina) * 100;
            document.getElementById('stamina-fill').style.width = staminaPct + '%';
            document.getElementById('stamina-text').innerText = `${Math.floor(player.stamina)} / ${player.maxStamina}`;
            document.getElementById('stamina-container').style.width = (120 * (player.maxStamina/100)) + 'px';

            player.currentSpeed = player.baseSpeed * (player.isRunning && player.stamina > 0 ? 1.8 : 1);

            if(player.isMoving) {
                let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forward.y=0; forward.normalize();
                let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y=0; right.normalize();
                let dir = new THREE.Vector3().addScaledVector(right, joyVector.x).addScaledVector(forward, -joyVector.y).normalize();
                
                let nextX = camera.position.x + dir.x * player.currentSpeed * delta;
                let nextZ = camera.position.z + dir.z * player.currentSpeed * delta;

                if(canMoveTo(nextX, camera.position.z)) camera.position.x = nextX;
                if(canMoveTo(camera.position.x, nextZ)) camera.position.z = nextZ;

                if(clock.elapsedTime - lastStepTime > (player.isRunning ? 0.3 : 0.6)) {
                    playSound('player', player.isRunning); lastStepTime = clock.elapsedTime;
                }
            }

            // التقاط الموارد
            for(let i=items.length-1; i>=0; i--) {
                let it = items[i]; it.mesh.rotation.y += Math.PI * delta;
                if(camera.position.distanceTo(it.mesh.position) < 2) {
                    if(it.type === 'green') {
                        if(player.greenCount === 0) { player.maxStamina = 140; player.baseSpeed = player.origSpeed * 1.2; }
                        else { player.maxStamina = 160; player.baseSpeed = player.origSpeed * 1.4; }
                        player.greenCount++; player.stamina = player.maxStamina; player.crystals.green++;
                        showMsg("زادت سرعتك وطاقتك!");
                    } else if(it.type === 'weapon') {
                        player.hasWeapon = true; showMsg("حصلت على السلاح الصوتي!");
                    } else if(it.type === 'ammo') { player.ammo++; }
                    else { player.crystals[it.type]++; }
                    updateInv(); scene.remove(it.mesh); items.splice(i, 1);
                }
            }

            // ذكاء الوحوش (السمع والهرب)
            monsters.forEach(m => {
                let distToPlayer = camera.position.distanceTo(m.mesh.position);
                
                if(m.fleeTimer > 0) {
                    m.fleeTimer -= delta;
                    m.mesh.lookAt(camera.position); m.mesh.rotation.y += Math.PI; // دوران للخلف
                    m.mesh.translateZ(player.origSpeed * 1.4 * delta); // يهرب بسرعة
                } else {
                    // نظام السمع
                    let hearingDist = player.isRunning ? 18 : (player.isMoving ? 8 : 3);
                    if(distToPlayer < hearingDist) m.aggro = true;
                    else if(distToPlayer > hearingDist * 2) m.aggro = false; // يفقد الأثر

                    let mSpeed = player.origSpeed * (m.aggro ? 1.4 : 1.1) * delta;
                    if(m.aggro) {
                        m.mesh.lookAt(camera.position.x, m.mesh.position.y, camera.position.z);
                        m.mesh.translateZ(mSpeed);
                    } else {
                        m.mesh.translateZ(mSpeed * 0.5);
                        if(Math.random() < 0.03) m.mesh.rotation.y += (Math.random()-0.5)*Math.PI;
                    }

                    // صوت الوحش
                    m.stepTimer += delta;
                    if(m.stepTimer > (m.aggro ? 0.3 : 0.6)) {
                        if(distToPlayer < 20) playSound('monster', m.aggro);
                        m.stepTimer = 0;
                    }
                }

                // نظام الاصطدام باللاعب
                if(distToPlayer < 1.5) {
                    if(player.crystals.pink > 0) {
                        player.crystals.pink--; updateInv(); teleportPlayer();
                        m.aggro = false; // الوحش يضيع بعد هربك
                    } else { player.isDead = true; }
                }
            });

            // الرادار
            const canvas = document.getElementById('minimap-canvas'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,110,110); ctx.save(); ctx.translate(55,55); ctx.rotate(camera.rotation.y);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            walls.forEach(w => {
                let dx = (w.position.x - camera.position.x)*1.5, dz = (w.position.z - camera.position.z)*1.5;
                if(Math.abs(dx)<55 && Math.abs(dz)<55) ctx.fillRect(dx-3, dz-3, 6, 6);
            });
            ctx.restore();
            ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.moveTo(55, 50); ctx.lineTo(50, 60); ctx.lineTo(60, 60); ctx.fill();

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
