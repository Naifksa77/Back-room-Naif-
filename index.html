<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lord Naif - The Masterpiece V7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; color: white; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 20px; text-align: center; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* الوقت في المنتصف صغير */
        #timer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; border: 1px solid #555; }
        
        /* حقيبة الموارد */
        #inventory { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; pointer-events: auto; }
        .inv-item { background: rgba(0,0,0,0.6); border: 1px solid #555; border-radius: 8px; padding: 5px 10px; font-size: 14px; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .inv-item.blue { cursor: pointer; border-color: cyan; }
        .inv-item.blue:active { background: rgba(0, 255, 255, 0.3); }
        .inv-count { font-weight: bold; margin-top: 2px; }
        .blue-timer { font-size: 10px; color: cyan; margin-top: 2px; }

        /* عصا التحكم */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; position: absolute; top: 40px; left: 40px; }

        /* الأزرار والتحمل */
        #btn-run { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; pointer-events: auto; font-size: 18px; }
        #stamina-container { position: absolute; bottom: 130px; right: 20px; width: 120px; height: 15px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 4px; pointer-events: none; transition: width 0.3s; }
        #stamina-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.1s, background-color 0.3s; }
        #stamina-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center; font-size: 10px; line-height: 15px; font-weight: bold; text-shadow: 1px 1px #000; }

        /* الرادار */
        #minimap { position: absolute; top: 15px; left: 15px; width: 120px; height: 120px; border: 2px solid rgba(255,215,0,0.5); border-radius: 50%; background: rgba(0,0,0,0.8); overflow: hidden; box-shadow: 0 0 10px #000; }
        
        #msg { position: absolute; top: 25%; width: 100%; text-align: center; color: yellow; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; display: none; }
        
        #death-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; }
        .restart-btn { margin-top: 30px; padding: 15px 40px; background: #ff0000; color: #000; border: 2px solid #000; cursor: pointer; font-size: 22px; font-weight: bold; border-radius: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="rotate">استدر بالجوال للوضع العرضي 📱</div>
    
    <div id="ui">
        <div id="timer">05:00</div>
        <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>

        <div id="inventory">
            <div id="inv-pink" class="inv-item" style="color: hotpink;">💎 <span class="inv-count">0</span></div>
            <div id="inv-blue" class="inv-item blue">🔵 <span class="inv-count">0</span><div id="blue-timer-txt" class="blue-timer"></div></div>
            <div id="inv-green" class="inv-item" style="color: lime;">🟢 <span class="inv-count">0</span></div>
        </div>

        <div id="stamina-container">
            <div id="stamina-fill"></div>
            <div id="stamina-text">100 / 100</div>
        </div>
        <div id="btn-run">اركض</div>
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <div id="msg"></div>
    </div>

    <div id="death-screen">
        <h1 style="color: #ff0000; font-size: 50px; text-shadow: 3px 3px #000; margin-bottom: 0;">نال الوحش منك</h1>
        <button class="restart-btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>

    <script>
        let scene, camera, renderer, clock, playerLight;
        let mapSize = 25, cellSize = 6; // أروقة واسعة جداً
        let grid = [], walls = [], items = [], monsters = [];
        let gameTime = 300; 

        // إعدادات اللاعب المحسنة
        let player = {
            baseSpeed: 4, currentSpeed: 4,
            maxStamina: 100, stamina: 100,
            isRunning: false, isMoving: false, isDead: false,
            crystals: { pink: 0, blue: 0, green: 0 },
            blueActive: false, blueTimeLeft: 0,
            deathTimer: 0
        };

        // متغيرات التحكم
        let joyActive = false, joyVector = { x: 0, y: 0 };
        let lookTouchId = null, lastLookX = 0, lastLookY = 0;
        
        // نظام الصوت (Web Audio API Synthesizer)
        let audioCtx = null;
        let lastStepTime = 0;

        function initAudio() {
            if(!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playFootstep(isMonster = false, isRunning = false) {
            if(!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(isMonster) {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(isRunning ? 80 : 120, audioCtx.currentTime);
                gain.gain.setValueAtTime(isRunning ? 0.8 : 0.4, audioCtx.currentTime);
            } else {
                osc.type = 'sine'; osc.frequency.setValueAtTime(isRunning ? 200 : 150, audioCtx.currentTime);
                gain.gain.setValueAtTime(isRunning ? 0.2 : 0.05, audioCtx.currentTime);
            }
            
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.06); // ضباب أخف للمساحات الواسعة

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(cellSize*1.5, 1.6, cellSize*1.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // إضاءة
            scene.add(new THREE.AmbientLight(0x1a1a20));
            playerLight = new THREE.PointLight(0xffeedd, 1.2, 15);
            camera.add(playerLight); scene.add(camera);

            let floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);

            generateMaze();
            spawnMonsters();
            spawnItems();

            setupControls();
            startTimer();
            
            // تهيئة الصوت عند أول لمسة
            window.addEventListener('touchstart', initAudio, {once:true});
            
            animate();
        }

        function generateMaze() {
            const wallGeo = new THREE.BoxGeometry(cellSize, 5, cellSize);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
            for(let i=0; i<mapSize; i++) {
                grid[i] = [];
                for(let j=0; j<mapSize; j++) {
                    let isWall = (i===0 || i===mapSize-1 || j===0 || j===mapSize-1 || Math.random() > 0.7);
                    if(i < 3 && j < 3) isWall = false; // مساحة البداية
                    if(isWall) {
                        grid[i][j] = 1;
                        let wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(i*cellSize, 2.5, j*cellSize);
                        scene.add(wall); walls.push(wall);
                    } else {
                        grid[i][j] = 0;
                    }
                }
            }
        }

        // تصميم الوحش: بشري طويل الأطراف
        function createMonsterModel(isRed) {
            let group = new THREE.Group();
            let mat = new THREE.MeshStandardMaterial({ color: isRed ? 0xaa0000 : 0xdddddd, roughness: 0.3 });
            
            let torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.4), mat); torso.position.y = 2.5; group.add(torso);
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.3), mat); head.position.y = 3.8; group.add(head);
            let armL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.5), mat); armL.position.set(-0.4, 1.5, 0); group.add(armL);
            let armR = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.5), mat); armR.position.set(0.4, 1.5, 0); group.add(armR);
            let legL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.5), mat); legL.position.set(-0.2, 0.5, 0); group.add(legL);
            let legR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.5), mat); legR.position.set(0.2, 0.5, 0); group.add(legR);
            
            if(isRed) {
                let glow = new THREE.PointLight(0xff0000, 2, 10); glow.position.y = 2.5; group.add(glow);
            }
            return group;
        }

        // تصميم جثة اللاعب
        function createDeadPlayer() {
            let group = new THREE.Group();
            let mat = new THREE.MeshStandardMaterial({ color: 0xd2b48c }); // بيج
            let torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 0.3), mat); torso.position.set(0, 0.15, 0); torso.rotation.x = Math.PI/2; group.add(torso);
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.2), mat); head.position.set(0, 0.15, 0.9); group.add(head);
            return group;
        }

        function getEmptyPos(nearStart = false) {
            let x, z;
            do {
                if(nearStart) { x = Math.floor(Math.random()*2)+1; z = Math.floor(Math.random()*3)+1; }
                else { x = Math.floor(Math.random()*(mapSize-2))+1; z = Math.floor(Math.random()*(mapSize-2))+1; }
            } while(grid[x][z] === 1);
            return new THREE.Vector3(x*cellSize, 0, z*cellSize);
        }

        function spawnMonsters() {
            for(let i=0; i<3; i++) {
                let mType = i===0 ? 'red' : 'white';
                let mesh = createMonsterModel(mType === 'red');
                let pos = getEmptyPos(); mesh.position.copy(pos);
                scene.add(mesh);
                monsters.push({ mesh: mesh, type: mType, aggro: false, stepTimer: 0 });
            }
        }

        function spawnItems() {
            // 3 زرقاء (واحدة قريبة)
            spawnItem('blue', getEmptyPos(true));
            spawnItem('blue', getEmptyPos()); spawnItem('blue', getEmptyPos());
            // خضراء ووردية
            spawnItem('green', getEmptyPos());
            spawnItem('pink', getEmptyPos()); spawnItem('pink', getEmptyPos());
        }

        function spawnItem(type, pos) {
            let color = type==='blue'?0x00ffff : type==='pink'?0xff69b4 : 0x00ff00;
            let mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.4), new THREE.MeshBasicMaterial({color: color}));
            mesh.position.set(pos.x, 0.5, pos.z); scene.add(mesh);
            items.push({ mesh: mesh, type: type });
        }

        function setupControls() {
            // الكاميرا عبر أي مكان فارغ
            window.addEventListener('touchstart', (e) => {
                if(e.target.id === 'btn-run' || e.target.closest('#joystick-zone') || e.target.closest('.inv-item')) return;
                lookTouchId = e.touches[0].identifier;
                lastLookX = e.touches[0].clientX;
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                for(let t of e.touches) {
                    if(t.identifier === lookTouchId) {
                        e.preventDefault();
                        camera.rotation.y -= (t.clientX - lastLookX) * 0.005;
                        lastLookX = t.clientX;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) if(t.identifier === lookTouchId) lookTouchId = null;
            });

            // الجويستيك
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            let jRect = zone.getBoundingClientRect(), jCenterX = jRect.left + jRect.width/2, jCenterY = jRect.top + jRect.height/2;

            zone.addEventListener('touchstart', (e) => { e.preventDefault(); joyActive = true; updateJoy(e.touches[0]); });
            zone.addEventListener('touchmove', (e) => { e.preventDefault(); if(joyActive) updateJoy(e.touches[0]); });
            zone.addEventListener('touchend', (e) => { e.preventDefault(); joyActive = false; joyVector = {x:0, y:0}; stick.style.transform = `translate(0px, 0px)`; player.isMoving = false; });

            function updateJoy(touch) {
                player.isMoving = true;
                let dx = touch.clientX - jCenterX, dy = touch.clientY - jCenterY;
                let dist = Math.sqrt(dx*dx + dy*dy); let maxDist = 40;
                if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                joyVector = { x: dx/maxDist, y: dy/maxDist };
            }

            // زر الركض
            const runBtn = document.getElementById('btn-run');
            runBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.isRunning = true; runBtn.style.background = 'rgba(255,255,255,0.4)'; });
            runBtn.addEventListener('touchend', (e) => { e.preventDefault(); player.isRunning = false; runBtn.style.background = 'rgba(255,255,255,0.1)'; });

            // تفعيل الزرقاء
            document.getElementById('inv-blue').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(player.crystals.blue > 0 && !player.blueActive) {
                    player.crystals.blue--; updateInv();
                    player.blueActive = true; player.blueTimeLeft = 120;
                    playerLight.intensity = 4; playerLight.distance = 50;
                }
            });
        }

        function updateInv() {
            for(let key in player.crystals) {
                let ui = document.getElementById('inv-'+key);
                if(player.crystals[key] > 0 || (key==='blue' && player.blueActive)) {
                    ui.style.display = 'flex'; ui.querySelector('.inv-count').innerText = player.crystals[key];
                }
            }
        }

        function startTimer() {
            setInterval(() => {
                if(gameTime > 0 && !player.isDead) {
                    gameTime--;
                    let m = Math.floor(gameTime/60), s = gameTime%60;
                    document.getElementById('timer').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                    
                    if(player.blueActive) {
                        player.blueTimeLeft--;
                        let bm = Math.floor(player.blueTimeLeft/60), bs = player.blueTimeLeft%60;
                        document.getElementById('blue-timer-txt').innerText = `${bm}:${bs<10?'0':''}${bs}`;
                        if(player.blueTimeLeft <= 0) {
                            player.blueActive = false; playerLight.intensity = 1.2; playerLight.distance = 15;
                            document.getElementById('blue-timer-txt').innerText = "";
                        }
                    }
                }
            }, 1000);
        }

        function canMoveTo(newX, newZ) {
            let gridX = Math.round(newX / cellSize), gridZ = Math.round(newZ / cellSize);
            if(gridX < 0 || gridX >= mapSize || gridZ < 0 || gridZ >= mapSize) return false;
            return grid[gridX][gridZ] === 0;
        }

        // ذكاء الوحش (Line of Sight)
        function checkLineOfSight(monsterMesh) {
            let dir = new THREE.Vector3().subVectors(camera.position, monsterMesh.position).normalize();
            let dist = camera.position.distanceTo(monsterMesh.position);
            if(dist > 40) return false; // مدى الرؤية
            
            let ray = new THREE.Raycaster(monsterMesh.position, dir, 0, dist);
            let intersects = ray.intersectObjects(walls);
            return intersects.length === 0; // يراك إذا لم يكن هناك جدار
        }

        let deadBody = null;

        function animate() {
            requestAnimationFrame(animate);
            let delta = Math.min(clock.getDelta(), 0.1);

            // ---------------- كاميرا الموت ----------------
            if(player.isDead) {
                player.deathTimer += delta;
                if(!deadBody) {
                    deadBody = createDeadPlayer(); deadBody.position.copy(camera.position); deadBody.position.y = 0;
                    scene.add(deadBody);
                    document.getElementById('ui').style.display = 'none';
                }
                // دوران الكاميرا
                camera.position.x = deadBody.position.x + Math.sin(player.deathTimer * 1.5) * 5;
                camera.position.z = deadBody.position.z + Math.cos(player.deathTimer * 1.5) * 5;
                camera.position.y = 3;
                camera.lookAt(deadBody.position);
                
                if(player.deathTimer > 3) document.getElementById('death-screen').style.display = 'flex';
                renderer.render(scene, camera);
                return;
            }

            // ---------------- حركة اللاعب ----------------
            if(player.isMoving && player.isRunning && player.stamina > 0) player.stamina -= 25 * delta;
            else player.stamina = Math.min(player.maxStamina, player.stamina + 15 * delta);
            
            let staminaPct = (player.stamina / player.maxStamina) * 100;
            document.getElementById('stamina-fill').style.width = staminaPct + '%';
            document.getElementById('stamina-text').innerText = `${Math.floor(player.stamina)} / ${player.maxStamina}`;
            if(player.maxStamina > 100) document.getElementById('stamina-container').style.width = '144px'; // تكبير الشريط للكريستالة الخضراء

            player.currentSpeed = player.baseSpeed * (player.isRunning && player.stamina > 0 ? 1.8 : 1);

            if(player.isMoving) {
                let forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forward.y=0; forward.normalize();
                let right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y=0; right.normalize();
                
                let dir = new THREE.Vector3().addScaledVector(right, joyVector.x).addScaledVector(forward, -joyVector.y).normalize();
                let nextX = camera.position.x + dir.x * player.currentSpeed * delta;
                let nextZ = camera.position.z + dir.z * player.currentSpeed * delta;

                if(canMoveTo(nextX, camera.position.z)) camera.position.x = nextX;
                if(canMoveTo(camera.position.x, nextZ)) camera.position.z = nextZ;

                // صوت خطوات اللاعب
                if(clock.elapsedTime - lastStepTime > (player.isRunning ? 0.3 : 0.6)) {
                    playFootstep(false, player.isRunning); lastStepTime = clock.elapsedTime;
                }
            }

            // ---------------- التقاط الموارد ----------------
            for(let i=items.length-1; i>=0; i--) {
                let it = items[i]; it.mesh.rotation.y += Math.PI * delta;
                if(camera.position.distanceTo(it.mesh.position) < 2) {
                    player.crystals[it.type]++;
                    if(it.type === 'green') {
                        player.maxStamina = 120; player.stamina = 120;
                        player.baseSpeed = player.baseSpeed * 1.4;
                        document.getElementById('msg').innerText = "توسعت طاقتك وزادت سرعتك!";
                        document.getElementById('msg').style.display = 'block'; setTimeout(()=>document.getElementById('msg').style.display='none',3000);
                    }
                    updateInv(); scene.remove(it.mesh); items.splice(i, 1);
                }
            }

            // ---------------- ذكاء الوحوش ----------------
            monsters.forEach(m => {
                m.aggro = checkLineOfSight(m.mesh);
                let speedMult = m.aggro ? 1.4 : 1.1; // 140% أو 110% من سرعة اللاعب الأساسية
                let mSpeed = player.baseSpeed * speedMult * delta;

                if(m.aggro) {
                    m.mesh.lookAt(camera.position.x, m.mesh.position.y, camera.position.z);
                    m.mesh.translateZ(mSpeed);
                } else {
                    // تجول عشوائي
                    if(Math.random() < 0.02) m.mesh.rotation.y += Math.random() * Math.PI;
                    m.mesh.translateZ(mSpeed * 0.5);
                }

                // صوت خطوات الوحش
                m.stepTimer += delta;
                if(m.stepTimer > (m.aggro ? 0.25 : 0.5)) {
                    if(camera.position.distanceTo(m.mesh.position) < 25) playFootstep(true, m.aggro);
                    m.stepTimer = 0;
                }

                if(camera.position.distanceTo(m.mesh.position) < 1.5) player.isDead = true;
            });

            // ---------------- الرادار الديناميكي ----------------
            const canvas = document.getElementById('minimap-canvas'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,120,120); ctx.save();
            ctx.translate(60,60); 
            ctx.rotate(camera.rotation.y); // الخريطة تدور عكس اللاعب ليبقى السهم للأعلى
            
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            walls.forEach(w => {
                let dx = (w.position.x - camera.position.x)*1.5, dz = (w.position.z - camera.position.z)*1.5;
                if(Math.abs(dx)<60 && Math.abs(dz)<60) ctx.fillRect(dx-3, dz-3, 6, 6);
            });
            ctx.restore();

            // سهم اللاعب ثابت يشير للأعلى
            ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.moveTo(60, 55); ctx.lineTo(55, 65); ctx.lineTo(65, 65); ctx.fill();

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
