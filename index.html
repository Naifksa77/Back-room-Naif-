<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Horror Maze - Lord Naif Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; touch-action: none; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #minimap { position: absolute; top: 15px; left: 15px; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; background: rgba(0,0,0,0.6); overflow: hidden; }
        #minimap-canvas { width: 100%; height: 100%; }
        #stamina-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 5px; }
        #stamina-fill { width: 100%; height: 100%; background: #fff; transition: width 0.1s; }
        .btn { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-weight: bold; }
        #btn-run { bottom: 20px; right: 20px; width: 70px; height: 70px; }
        #btn-shoot { bottom: 100px; right: 100px; width: 50px; height: 50px; background: rgba(255,0,0,0.2); display: none; }
        #timer { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #fff; font-weight: bold; }
        #msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #f00; font-size: 22px; text-align: center; display: none; text-shadow: 2px 2px #000; font-weight: bold; }
        #death-screen, #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; pointer-events: auto; }
        .restart-btn { margin-top: 20px; padding: 10px 20px; background: #333; color: #fff; border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="rotate">يرجى تدوير الجوال للوضع العرضي 📱</div>
    <div id="ui">
        <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
        <div id="timer">05:00</div>
        <div id="msg"></div>
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
        <div id="btn-run" class="btn">اركض</div>
        <div id="btn-shoot" class="btn">🔊</div>
    </div>
    <div id="death-screen"><h1>لقد أمسك بك الوحش!</h1><button class="restart-btn" onclick="location.reload()">إعادة المحاولة</button></div>
    <div id="win-screen"><h1 style="color: gold;">مبروك يا لورد نايف! لقد فزت!</h1><button class="restart-btn" onclick="location.reload()">اللعب مجدداً</button></div>

<script>
let scene, camera, renderer, clock, player = { speed: 0.1, stamina: 100, isRunning: false, isDead: false, level: 1, hasPurple: false };
let walls = [], monsters = [], items = [], victoryDoor = null, gameTime = 300;
let moveVec = new THREE.Vector2(), lookTouchId = null, moveTouchId = null;

function init() {
    scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x000000, 0.15);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(2, 1.6, 2); camera.rotation.order = 'YXZ';
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    clock = new THREE.Clock();

    let ambient = new THREE.AmbientLight(0x111111); scene.add(ambient);
    let flash = new THREE.SpotLight(0xffffff, 2.5, 18, Math.PI/7);
    camera.add(flash); flash.target.position.set(0,0,-1); camera.add(flash.target);
    scene.add(camera);

    createMaze(); createMonster('white', 18, 18);
    createItem('purple', 10, 10);
    setupControls(); startTimer(); animate();
}

function createMaze() {
    let geo = new THREE.BoxGeometry(2, 4, 2);
    let mat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    for(let i=0; i<20; i++) {
        for(let j=0; j<20; j++) {
            if(i==0 || i==19 || j==0 || j==19 || (Math.random() > 0.8 && !(i<4 && j<4))) {
                let wall = new THREE.Mesh(geo, mat); wall.position.set(i*2, 2, j*2);
                scene.add(wall); walls.push(wall);
            }
        }
    }
    let floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color:0x111111}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);
}

function createMonster(type, x, z) {
    let body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8), new THREE.MeshBasicMaterial({ color: type=='white'?0xffffff:0xff0000 }));
    body.position.set(x, 0.9, z);
    let ghost = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8), new THREE.MeshBasicMaterial({ color: 0x800080, wireframe: true, transparent: true, opacity: 0 }));
    scene.add(body); scene.add(ghost);
    monsters.push({ mesh: body, ghost: ghost, type: type, speed: type=='white'?0.05:0.07 });
}

function createItem(type, x, z) {
    let mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0x800080 }));
    mesh.position.set(x, 0.5, z); scene.add(mesh);
    items.push({ mesh: mesh, type: type });
}

function setupControls() {
    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth/2) moveTouchId = t.identifier;
            else lookTouchId = t.identifier;
        }
    });
    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveTouchId) moveVec.set(0, 1); // لمس اليسار يمشي للأمام
            if(t.identifier === lookTouchId) camera.rotation.y -= e.movementX * 0.01;
        }
    });
    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveTouchId) { moveTouchId = null; moveVec.set(0,0); }
            if(t.identifier === lookTouchId) lookTouchId = null;
        }
    });
    document.getElementById('btn-run').ontouchstart = () => player.isRunning = true;
    document.getElementById('btn-run').ontouchend = () => player.isRunning = false;
}

function startTimer() {
    setInterval(() => {
        if(gameTime > 0 && !player.isDead) {
            gameTime--;
            let m = Math.floor(gameTime/60), s = gameTime%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(gameTime == 180) { createMonster('white', 2, 18); showMsg("الوحش الثاني خرج من البوابة!"); }
            if(gameTime == 30) { showMsg("تحذير: الوحش الأحمر السمين يقترب!"); createMonster('red', 10, 18); }
        }
    }, 1000);
}

function showMsg(t) { let e=document.getElementById('msg'); e.innerText=t; e.style.display='block'; setTimeout(()=>e.style.display='none', 4000); }

function animate() {
    if(player.isDead) return;
    requestAnimationFrame(animate);
    let delta = clock.getDelta();

    // حركة
    let speed = (player.isRunning && player.stamina > 0) ? 0.18 : 0.08;
    if(moveVec.y > 0) camera.translateZ(-speed);
    
    // شريط التحمل
    if(player.isRunning) player.stamina = Math.max(0, player.stamina - 0.4);
    else player.stamina = Math.min(100, player.stamina + 0.2);
    document.getElementById('stamina-fill').style.width = player.stamina + '%';

    // ذكاء اصطناعي
    monsters.forEach(m => {
        m.mesh.lookAt(camera.position.x, 0.9, camera.position.z);
        m.mesh.translateZ(m.speed);
        m.ghost.position.copy(m.mesh.position);
        if(player.hasPurple) m.ghost.material.opacity = 0.5;
        if(m.mesh.position.distanceTo(camera.position) < 1.2) {
            player.isDead = true; document.getElementById('death-screen').style.display = 'flex';
        }
    });

    // كريستالات
    items.forEach((it, i) => {
        it.mesh.rotation.y += 0.02;
        if(camera.position.distanceTo(it.mesh.position) < 1.5) {
            if(it.type=='purple') { player.hasPurple = true; showMsg("الكريستالة البنفسجية: ترى الأشباح الآن!"); }
            scene.remove(it.mesh); items.splice(i,1);
        }
    });

    // رادار
    const canvas = document.getElementById('minimap-canvas'), ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,120,120); ctx.save(); ctx.translate(60,60); ctx.rotate(-camera.rotation.y);
    ctx.fillStyle = "#0f0"; ctx.fillRect(-2,-2,4,4); // اللاعب
    monsters.forEach(m => {
        ctx.fillStyle = m.type=='white'?'#fff':'#f00';
        ctx.fillRect((m.mesh.position.x-camera.position.x)*3, (m.mesh.position.z-camera.position.z)*3, 4, 4);
    });
    ctx.restore();

    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
