<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Lord Naif Chronicles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-box { background: #1a1a1a; padding: 20px; border: 2px solid gold; border-radius: 15px; width: 80%; max-width: 400px; }
        .start-btn { background: gold; color: black; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; font-size: 20px; margin-top: 20px; cursor: pointer; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #minimap { position: absolute; top: 10px; left: 10px; width: 100px; height: 100px; border: 2px solid #555; border-radius: 50%; background: rgba(0,255,0,0.1); overflow: hidden; }
        #minimap-canvas { width: 100%; height: 100%; }
        #stats { position: absolute; top: 10px; right: 10px; text-align: right; font-size: 14px; }
        .btn-action { position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #btn-shoot { bottom: 100px; background: rgba(255,0,0,0.3); border-color: red; }
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; color: yellow; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="menu-box">
            <h2>مرحباً يا لورد نايف</h2>
            <p>اختر معدات البداية:</p>
            <div style="font-size: 14px; margin-bottom: 10px;">
                💎 كريستالة بنفسجية (مفعلة) <br>
                🔫 سلاح دفاعي + 10 ذخيرة
            </div>
            <button class="start-btn" onclick="startGame()">ابدأ اللعب الآن ⚔️</button>
        </div>
        <p style="margin-top: 10px; font-size: 12px;">(اقلب الجوال بالعرض لتجربة أفضل)</p>
    </div>

    <div id="ui">
        <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
        <div id="stats">
            الذخيرة: <span id="ammo">10</span> <br>
            التحمل: <span id="stamina">100</span>%
        </div>
        <div id="msg"></div>
        <div id="btn-run" class="btn-action">اركض</div>
        <div id="btn-shoot" class="btn-action">إطلاق</div>
    </div>

    <script>
        let scene, camera, renderer, clock, player = { speed: 0.12, stamina: 100, ammo: 10, isRunning: false, hasPurple: true };
        let walls = [], monsters = [], items = [], mazeSize = 20;

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.15);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.6, 2);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // الإضاءة
            let light = new THREE.PointLight(0xffffff, 1, 20);
            camera.add(light);
            scene.add(camera);

            // بناء المتاهة
            const wallGeo = new THREE.BoxGeometry(2, 4, 2);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            for(let i=0; i<mazeSize; i++) {
                for(let j=0; j<mazeSize; j++) {
                    if(i==0 || i==mazeSize-1 || j==0 || j==mazeSize-1 || (Math.random() > 0.8 && !(i<3 && j<3))) {
                        let wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(i*2, 2, j*2);
                        scene.add(wall);
                        walls.push(new THREE.Vector2(i*2, j*2));
                    }
                }
            }

            // الأرضية
            let floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // إضافة الكريستالة البنفسجية
            let cry = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({color: 0x800080}));
            cry.position.set(10, 0.5, 10);
            scene.add(cry);

            setupControls();
            animate();
        }

        function setupControls() {
            document.getElementById('btn-run').ontouchstart = () => player.isRunning = true;
            document.getElementById('btn-run').ontouchend = () => player.isRunning = false;
            document.getElementById('btn-shoot').onclick = () => {
                if(player.ammo > 0) {
                    player.ammo--;
                    document.getElementById('ammo').innerText = player.ammo;
                    showMsg("تم إطلاق النار! 🔫");
                }
            };
            window.addEventListener('touchmove', (e) => {
                if(e.touches[0].clientX > window.innerWidth/2) camera.rotation.y -= e.movementX * 0.008;
            });
        }

        function showMsg(m) {
            let el = document.getElementById('msg');
            el.innerText = m; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            let moveSpeed = player.speed * (player.isRunning ? 1.7 : 1);
            camera.translateZ(-moveSpeed);

            // الرادار (الخريطة)
            const canvas = document.getElementById('minimap-canvas'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,100,100);
            ctx.fillStyle = "white";
            ctx.fillRect(50, 50, 4, 4); // اللاعب في المركز
            
            // رسم الجدران في الرادار
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            walls.forEach(w => {
                let dx = (w.x - camera.position.x) * 2;
                let dz = (w.y - camera.position.z) * 2;
                if(Math.abs(dx) < 50 && Math.abs(dz) < 50) ctx.fillRect(50+dx, 50+dz, 3, 3);
            });

            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
