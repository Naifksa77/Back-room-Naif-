<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horror Maze - Lord Naif</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 999; text-align: center; font-family: sans-serif; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #btn-run { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; pointer-events: auto; background: rgba(255,255,255,0.15); font-weight: bold; font-family: sans-serif; font-size: 18px; }
    </script>
</head>
<body>
    <div id="rotate">يرجى تدوير الجوال للوضع العرضي 📱</div>
    <div id="ui"><div id="btn-run">اركض</div></div>
    <script>
        let scene, camera, renderer, player = { speed: 0.1, isRunning: false };
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.12);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            let light = new THREE.SpotLight(0xffffff, 3, 25, Math.PI/6);
            camera.add(light); camera.add(light.target); light.target.position.set(0,0,-1);
            scene.add(camera);
            let floor = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color:0x151515}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);
            let wallGeo = new THREE.BoxGeometry(2, 4, 2);
            let wallMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            for(let i=0; i<40; i++) {
                let wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.set(Math.random()*60-30, 2, Math.random()*60-30);
                scene.add(wall);
            }
            document.getElementById('btn-run').ontouchstart = (e) => { e.preventDefault(); player.isRunning = true; };
            document.getElementById('btn-run').ontouchend = (e) => { e.preventDefault(); player.isRunning = false; };
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-(player.isRunning ? 0.25 : 0.08));
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        init();
    </script>
</body>
</html>
