<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lord Naif - The Ultimate Edition V6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; color: white; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 20px; text-align: center; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* حقيبة الموارد أعلى اليمين */
        #inventory { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; pointer-events: auto; }
        .inv-item { background: rgba(0,0,0,0.6); border: 1px solid #555; border-radius: 8px; padding: 5px 10px; font-size: 14px; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .inv-item.blue { cursor: pointer; border-color: cyan; }
        .inv-item.blue:active { background: rgba(0, 255, 255, 0.3); }
        .inv-count { font-weight: bold; margin-top: 2px; }
        .blue-timer { font-size: 10px; color: cyan; margin-top: 2px; }

        /* عصا التحكم اليسرى */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center; }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: relative; }

        /* الأزرار اليمنى */
        #btn-run { position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; pointer-events: auto; }
        #stamina-bar { position: absolute; bottom: 120px; right: 30px; width: 90px; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid #fff; border-radius: 4px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: #0f0; }

        /* الرادار والوقت */
        #top-left-ui { position: absolute; top: 15px; left: 15px; text-align: left; }
        #minimap { width: 100px; height: 100px; border: 2px solid rgba(255,215,0,0.4); border-radius: 50%; background: rgba(0,0,0,0.7); overflow: hidden; margin-bottom: 5px; }
        #timer { font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; }
        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: yellow; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; display: none; }
    </style>
</head>
<body>
    <div id="rotate">استدر بالجوال للوضع العرضي 📱</div>
    
    <div id="ui">
        <div id="top-left-ui">
            <div id="minimap"><canvas id="minimap-canvas" width="100" height="100"></canvas></div>
            <div id="timer">05:00</div>
        </div>

        <div id="inventory">
            <div id="inv-pink" class="inv-item" style="color: hotpink;">💎 <span class="inv-count">0</span></div>
            <div id="inv-blue" class="inv-item blue" onclick="activateBlueCrystal()">🔵 <span class="inv-count">1</span><div id="blue-timer-txt" class="blue-timer"></div></div>
            <div id="inv-green" class="inv-item" style="color: lime;">🟢 <span class="inv-count">0</span></div>
            <div id="inv-weapon" class="inv-item" style="color: white;">🔫 <span class="inv-count">0</span></div>
        </div>

        <div id="stamina-bar"><div id="stamina-fill"></div></div>
        <div id="btn-run">اركض</div>
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <div id="msg"></div>
    </div>

    <script>
        let scene, camera, renderer, clock, playerLight;
        let mapSize = 35, cellSize = 2; // خريطة ضخمة
        let grid = [], walls = [], items = [], monsters = [], goldenKey = null;
        let gameTime = 300, isEndgame = false; // 5 دقائق

        // موارد اللاعب
        let player = {
            stamina: 100, isRunning: false, 
            crystals: { pink: 0, blue: 0, green: 0 },
            ammo: 0,
            blueActive: false, blueTimeLeft: 0
        };

        // التحكم
        let joyActive = false, joyVector = { x: 0, y: 0 };
        let lookTouchId = null, lastLookX = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.12);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(2, 1.6, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // إضاءة اللاعب الأساسية
            scene.add(new THREE.AmbientLight(0x111115));
            playerLight = new THREE.PointLight(0xffddaa, 1.2, 10);
            camera.add(playerLight);
            scene.add(camera);

            let floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);

            generateMaze();
            spawnEntity('whiteMonster');
            spawnEntity('redMonster');
            spawnEntity('blue');
            spawnEntity('pink');
            spawnEntity('green'); // الخضراء الأولى
            spawnEntity('weapon');

            setupControls();
            startTimer();
            animate();
        }

        // بناء المتاهة بنظام الشبكة (لمنع التداخل)
        function generateMaze() {
            const wallGeo = new THREE.BoxGeometry(cellSize, 4, cellSize);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            for(let i=0; i<mapSize; i++) {
                grid[i] = [];
                for(let j=0; j<mapSize; j++) {
                    // إنشاء جدران خارجية وعشوائية، وترك مساحة آمنة للبداية
                    let isWall = (i===0 || i===mapSize-1 || j===0 || j===mapSize-1 || Math.random() > 0.75);
                    if(i < 4 && j < 4) isWall = false; 

                    if(isWall) {
                        grid[i][j] = 1;
                        let wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(i*cellSize, 2, j*cellSize);
                        scene.add(wall); walls.push(wall);
                    } else {
                        grid[i][j] = 0; // مسار فارغ
                    }
                }
            }
        }

        // الحصول على موقع فارغ لترسبن فيه الموارد دون الدخول في جدار
        function getEmptyPos() {
            let x, z;
            do {
                x = Math.floor(Math.random() * (mapSize-2)) + 1;
                z = Math.floor(Math.random() * (mapSize-2)) + 1;
            } while(grid[x][z] === 1);
            return new THREE.Vector3(x*cellSize, 0.5, z*cellSize);
        }

        function spawnEntity(type, specificPos = null) {
            let pos = specificPos || getEmptyPos();
            
            if(type.includes('Monster')) {
                let color = type === 'redMonster' ? 0xff0000 : 0xffffff;
                let m = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({color: color}));
                m.position.copy(pos); m.position.y = 1;
                
                if(type === 'redMonster') {
                    let glow = new THREE.PointLight(0xff0000, 2, 8); m.add(glow);
                }
                scene.add(m); monsters.push({ mesh: m, type: type, speed: type === 'redMonster' ? 1.5 : 1 });
            } 
            else if(type === 'key') {
                goldenKey = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffd700}));
                goldenKey.position.copy(pos); goldenKey.position.y = 1;
                let glow = new THREE.PointLight(0xffd700, 2, 5); goldenKey.add(glow);
                scene.add(goldenKey); showMsg("ظهر المفتاح الذهبي!");
            }
            else { // موارد
                let color = type==='blue'?0x00ffff : type==='pink'?0xff69b4 : type==='green'?0x00ff00 : 0xaaaaaa;
                let mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({color: color}));
                mesh.position.copy(pos); scene.add(mesh);
                items.push({ mesh: mesh, type: type });
            }
        }

        function setupControls() {
            // الجويستيك الأيسر
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            let jRect = zone.getBoundingClientRect();
            let jCenterX = jRect.left + jRect.width/2;
            let jCenterY = jRect.top + jRect.height/2;

            zone.addEventListener('touchstart', (e) => { e.preventDefault(); joyActive = true; updateJoy(e.touches[0]); });
            zone.addEventListener('touchmove', (e) => { e.preventDefault(); if(joyActive) updateJoy(e.touches[0]); });
            zone.addEventListener('touchend', (e) => { 
                e.preventDefault(); joyActive = false; joyVector = {x:0, y:0};
                stick.style.transform = `translate(0px, 0px)`;
            });

            function updateJoy(touch) {
                let dx = touch.clientX - jCenterX, dy = touch.clientY - jCenterY;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 35;
                if(distance > maxDist) { dx = (dx/distance)*maxDist; dy = (dy/distance)*maxDist; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                joyVector = { x: dx/maxDist, y: dy/maxDist }; // قيم من -1 إلى 1
            }

            // الالتفاف (النصف الأيمن من الشاشة، فوق الأزرار)
            window.addEventListener('touchstart', (e) => {
                for(let t of e.touches) {
                    if(t.clientX > window.innerWidth/2 && t.clientY < window.innerHeight - 150) {
                        lookTouchId = t.identifier; lastLookX = t.clientX;
                    }
                }
            });
            window.addEventListener('touchmove', (e) => {
                for(let t of e.touches) {
                    if(t.identifier === lookTouchId) {
                        camera.rotation.y -= (t.clientX - lastLookX) * 0.005;
                        lastLookX = t.clientX;
                    }
                }
            });
            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) if(t.identifier === lookTouchId) lookTouchId = null;
            });

            // زر الركض
            const runBtn = document.getElementById('btn-run');
            runBtn.ontouchstart = (e) => { e.preventDefault(); player.isRunning = true; runBtn.style.background = 'rgba(255,255,255,0.4)'; };
            runBtn.ontouchend = (e) => { e.preventDefault(); player.isRunning = false; runBtn.style.background = 'rgba(255,255,255,0.1)'; };
        }

        // نظام منع اختراق الجدران (Collision)
        function canMoveTo(newX, newZ) {
            let gridX = Math.round(newX / cellSize);
            let gridZ = Math.round(newZ / cellSize);
            if(gridX < 0 || gridX >= mapSize || gridZ < 0 || gridZ >= mapSize) return false;
            return grid[gridX][gridZ] === 0; // 0 يعني ممر فارغ
        }

        function activateBlueCrystal() {
            if(player.crystals.blue > 0 && !player.blueActive) {
                player.crystals.blue--;
                player.blueActive = true;
                player.blueTimeLeft = 120; // دقيقتين
                playerLight.intensity = 4; // كشاف قوي
                playerLight.distance = 40;
                document.querySelector('#inv-blue .inv-count').innerText = player.crystals.blue;
                showMsg("تم تفعيل الكشاف الأزرق!");
            }
        }

        function startTimer() {
            setInterval(() => {
                if(gameTime > 0) {
                    gameTime--;
                    let m = Math.floor(gameTime/60), s = gameTime%60;
                    document.getElementById('timer').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                    
                    // الكريستالة الخضراء الثانية
                    if(gameTime === 120) spawnEntity('green');

                    // عداد الكشاف الأزرق
                    if(player.blueActive) {
                        player.blueTimeLeft--;
                        let bm = Math.floor(player.blueTimeLeft/60), bs = player.blueTimeLeft%60;
                        document.getElementById('blue-timer-txt').innerText = `${bm}:${bs<10?'0':''}${bs}`;
                        if(player.blueTimeLeft <= 0) {
                            player.blueActive = false;
                            playerLight.intensity = 1.2; playerLight.distance = 10;
                            document.getElementById('blue-timer-txt').innerText = "";
                        }
                    }

                    // نهاية الوقت (Endgame)
                    if(gameTime === 0 && !isEndgame) {
                        isEndgame = true;
                        let redM = monsters.find(m => m.type === 'redMonster');
                        if(redM) spawnEntity('key', redM.mesh.position);
                        
                        monsters.forEach(m => scene.remove(m.mesh));
                        monsters = [];
                    }
                }
            }, 1000);
        }

        function showMsg(t) {
            let el = document.getElementById('msg'); el.innerText = t; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = Math.min(clock.getDelta(), 0.1);

            // حساب الحركة من الجويستيك
            let isMoving = (Math.abs(joyVector.x) > 0.1 || Math.abs(joyVector.y) > 0.1);
            
            // إدارة التحمل (ينقص فقط إذا ضغطت ركض وأنت تتحرك فعلياً)
            if(isMoving && player.isRunning && player.stamina > 0) {
                player.stamina -= 25 * delta;
            } else {
                player.stamina = Math.min(100, player.stamina + 15 * delta);
            }
            document.getElementById('stamina-fill').style.width = player.stamina + '%';

            let moveSpeed = (player.isRunning && player.stamina > 0) ? 6 : 3;
            
            if(isMoving) {
                // حساب الاتجاه بناءً على زاوية الكاميرا والجويستيك
                let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                let right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                let moveDir = new THREE.Vector3()
                    .addScaledVector(right, joyVector.x)
                    .addScaledVector(forward, -joyVector.y)
                    .normalize()
                    .multiplyScalar(moveSpeed * delta);

                let nextX = camera.position.x + moveDir.x;
                let nextZ = camera.position.z + moveDir.z;

                // تطبيق التصادم (Collision)
                if(canMoveTo(nextX, camera.position.z)) camera.position.x = nextX;
                if(canMoveTo(camera.position.x, nextZ)) camera.position.z = nextZ;
            }

            // التقاط الموارد
            for(let i=items.length-1; i>=0; i--) {
                let it = items[i]; it.mesh.rotation.y += Math.PI * delta;
                if(camera.position.distanceTo(it.mesh.position) < 1.5) {
                    if(it.type === 'blue' || it.type === 'pink' || it.type === 'green') {
                        player.crystals[it.type]++;
                        let ui = document.getElementById('inv-'+it.type);
                        ui.style.display = 'flex';
                        ui.querySelector('.inv-count').innerText = player.crystals[it.type];
                    } else if(it.type === 'weapon') {
                        player.ammo++;
                        let ui = document.getElementById('inv-weapon');
                        ui.style.display = 'flex';
                        ui.querySelector('.inv-count').innerText = player.ammo;
                    }
                    scene.remove(it.mesh); items.splice(i, 1);
                }
            }

            // المفتاح الذهبي
            if(goldenKey) {
                goldenKey.rotation.x += delta; goldenKey.rotation.y += delta;
                if(camera.position.distanceTo(goldenKey.position) < 1.5) {
                    alert("لقد حصلت على المفتاح الذهبي! فزت باللعبة يا لورد نايف!");
                    location.reload();
                }
            }

            // تحديث الرادار
            const canvas = document.getElementById('minimap-canvas'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,100,100); ctx.save(); ctx.translate(50,50); ctx.rotate(-camera.rotation.y);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            walls.forEach(w => {
                let dx = (w.position.x - camera.position.x)*2, dz = (w.position.z - camera.position.z)*2;
                if(Math.abs(dx)<50 && Math.abs(dz)<50) ctx.fillRect(dx-2, dz-2, 4, 4);
            });
            ctx.fillStyle = "#0f0"; ctx.fillRect(-2,-2,4,4); // اللاعب
            ctx.restore();

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
