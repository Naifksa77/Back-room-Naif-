<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
        #info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-family: sans-serif; text-align: center; z-index: 10; font-size: 20px; width: 90%; }
    </style>
</head>
<body>
    <div id="info">لورد نايف.. إذا شفت مكعب أخضر يدور<br>يعني جوالك جاهز للعبة الرعب!</div>
    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        let cube = new THREE.Mesh(new THREE.BoxGeometry(), new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true }));
        scene.add(cube);
        camera.position.z = 3;
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.02; cube.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
