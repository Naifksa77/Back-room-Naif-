<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lord Naif - Stable Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { position: absolute; bottom: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; pointer-events: auto; }
        #btn-up { right: 30px; }
        #btn-down { left: 30px; }
        #info { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 16px; font-weight: bold; }
        #rotate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        @media screen and (orientation: landscape) { #rotate { display: none; } }
    </style>
</head>
<body>
    <div id="rotate">يرجى تدوير الجوال للوضع العرضي 📱</div>
    <div id="ui">
        <div id="info">لورد نايف: المتاهة المستقرة 🟢<br>اسحب الشاشة للالتفاف</div>
        <div id="btn-up" class="btn">أمام</div>
        <div id="btn-down" class="btn">خلف</div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let moveForward = false, moveBackward = false;
        let lastX = null;

        function init() {
            // تهيئة المشهد الأساسي بدون تعقيد
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 1, 20); // ضباب لإخفاء نهاية الخريطة

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // أرضية بسيطة
            let floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ color: 0x222222 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // جدران المتاهة (بخامة ملونة تعكس الاتجاهات لتخفيف الضغط)
            let wallGeo = new THREE.BoxGeometry(2, 4, 2);
            let wallMat = new THREE.MeshNormalMaterial(); 
            for(let i=0; i<80; i++) {
                let wall = new THREE.Mesh(wallGeo, wallMat);
                let wx = Math.floor(Math.random() * 20 - 10) * 2;
                let wz = Math.floor(Math.random() * 20 - 10) * 2;
                if(wx === 0 && wz === 0) continue; // ترك منطقة البداية فارغة
                wall.position.set(wx, 2, wz);
                scene.add(wall);
            }

            // أزرار التحكم الجديدة
            document.getElementById('btn-up').ontouchstart = (e) => { e.preventDefault(); moveForward = true; };
            document.getElementById('btn-up').ontouchend = (e) => { e.preventDefault(); moveForward = false; };
            document.getElementById('btn-down').ontouchstart = (e) => { e.preventDefault(); moveBackward = true; };
            document.getElementById('btn-down').ontouchend = (e) => { e.preventDefault(); moveBackward = false; };

            // الالتفاف عبر سحب الشاشة
            window.addEventListener('touchmove', (e) => {
                let currentX = e.touches[0].clientX;
                if(lastX !== null) {
                    let diff = currentX - lastX;
                    camera.rotation.y -= diff * 0.008;
                }
                lastX = currentX;
            });
            window.addEventListener('touchend', () => lastX = null);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            let speed = 4 * delta;

            if(moveForward) camera.translateZ(-speed);
            if(moveBackward) camera.translateZ(speed);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
